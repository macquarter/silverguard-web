<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실버가드 · FIG.02 신뢰 누적 흐름도 · 5겹 검증 체계</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070A14;--bg-2:#0C111E;--surface:#121828;--surface-2:#1A2236;
  --line:rgba(255,255,255,0.08);--line-2:rgba(255,255,255,0.14);
  --ink:#F5F7FA;--ink-soft:#C7CCD8;--mute:#8A93A6;--mute-2:#5B6478;
  --cyan:#00D9FF;--cyan-deep:#0099D4;--lime:#C5F82A;--amber:#FFB547;--red:#FF5A6F;
  --serif:'Instrument Serif','Pretendard Variable',serif;
  --sans:'Pretendard Variable',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
html, body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;width:100%}
body{padding:40px 0;display:flex;align-items:center;justify-content:center}
*, em, i, h1 em, h2 em, .photo-band-headline em{font-style:normal !important}
svg text{font-style:normal !important}
.trust-illust{position:relative;margin:0;padding:80px 0;background:linear-gradient(180deg, transparent, rgba(0,217,255,0.02), transparent);border-top:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden;width:100%}
@media (max-width:680px){.trust-illust{padding:60px 0}}
.trust-illust-inner{max-width:1480px;margin:0 auto;padding:0 56px;position:relative}
@media (max-width:680px){.trust-illust-inner{padding:0 24px}}
.trust-illust svg{width:100%;height:auto;display:block}
.export-tag{position:fixed;top:20px;right:20px;font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:var(--mute);text-transform:uppercase;padding:6px 12px;border:1px solid var(--line-2);background:rgba(7,10,20,0.6);border-radius:3px;z-index:10}
.export-tag::before{content:'';display:inline-block;width:5px;height:5px;background:var(--lime);border-radius:50%;margin-right:8px;vertical-align:middle;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="export-tag">EXPORT · MERITZ TRUST STACK</div>

      <g transform="translate(1000, 140)"><line x1="0" y1="0" x2="60" y2="0" stroke="rgba(255,255,255,0.3)" stroke-width="1"/><path d="M 56 -4 L 62 0 L 56 4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/></g>
      <g transform="translate(1160, 140)">

        <text y="14" font-family="Pretendard, sans-serif" font-size="11" fill="#FF5A6F" text-anchor="middle" font-weight="500">특허 4건</text>
        <line x1="-26" y1="24" x2="26" y2="24" stroke="rgba(255,90,111,0.4)" stroke-width="0.5"/>
        <text y="36" font-family="JetBrains Mono, monospace" font-size="7.5" fill="rgba(255,255,255,0.5)" text-anchor="middle">10-2026-50085</text>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:18px;border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;letter-spacing:0.15em;color:var(--mute);text-transform:uppercase">
      <span>FIG. 02 · 신뢰 누적 흐름 · 5겹 검증 체계</span>
